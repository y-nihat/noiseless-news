# Source registry — the single, named, reviewable list of what we scan.
# Lifecycle (candidate/active/retired, discovery, demotion): policy/source-lifecycle.md
#
# Fields:
#   name:      unique human-readable name (referenced in evidence logs)
#   tier:      0 primary | 1 literature | 2 quality press | 3 community (discovery only)
#   type:      rss | arxiv_api | html | youtube_channel
#   url:       feed/API/page URL
#   status:    active (default) | candidate | retired
#   verified:  true once live validation confirmed the URL resolves and parses
#   notes:     anything an agent or reviewer should know
#
# Tier 3 sources are NEVER used to confirm a claim — discovery only (see
# policy/verification.md §1). Add or change sources via commits only.

