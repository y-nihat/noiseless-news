  # ---- Tier 1: literature ---------------------------------------------------
  - name: arXiv cs.AI+cs.LG+cs.CL
    tier: 1
    type: arxiv_api
    url: https://export.arxiv.org/api/query?search_query=cat:cs.AI+OR+cat:cs.LG+OR+cat:cs.CL&sortBy=submittedDate&sortOrder=descending&max_results=100
    verified: true
    notes: >
      Use export.arxiv.org only. Rate limit: max 1 request per 3 seconds, single
      connection. Label all results "preprint — not peer-reviewed".
  - name: arXiv cs.CV+stat.ML
    tier: 1
    type: arxiv_api
    url: https://export.arxiv.org/api/query?search_query=cat:cs.CV+OR+cat:stat.ML&sortBy=submittedDate&sortOrder=descending&max_results=100
    verified: true
    notes: Same rate limit as the other arXiv query; share the 3s budget.
  - name: Nature Machine Intelligence
    tier: 1
    type: rss
    url: https://www.nature.com/natmachintell.rss
    verified: true
  - name: Nature Machine Learning subject feed
    tier: 1
    type: rss
    url: https://www.nature.com/subjects/machine-learning.rss
    verified: true
  - name: Journal of Machine Learning Research
    tier: 1
    type: rss
    url: https://www.jmlr.org/jmlr.xml
    verified: true
    notes: Peer-reviewed; low frequency. Conference proceedings (NeurIPS/ICML/ICLR)
      are event-driven — handled via OpenReview lookups during verification, not a feed.
  - name: METR
    tier: 1
    type: html
    url: https://metr.org/research
    verified: true
    notes: Independent AI safety/capability evaluator. Registered 2026-07-10 after
      being load-bearing for the GPT-5.6 reward-hacking finding. Primarily a
      verification target, not a scan source.
  - name: Vals AI
    tier: 1
    type: html
    url: https://www.vals.ai
    verified: true
    notes: Independent benchmark tracker — verification target for capability claims.
      Live leaderboard drifts; figures MUST be fetched live at publication time with
      timestamp recorded (verification.md §5).
  - name: Artificial Analysis
