  # -- Google News query feeds (registry batch 2, 2026-07-11): categorical
  #    breadth beyond named sites. One pull ≈ 100 items from ~80 outlets.
  #    STRICTLY Tier 3 discovery: items carry via_outlet (origin), and every
  #    lead must be traced to its origin before any use as evidence.
  #    Independence rules apply unchanged. Expect finance/listicle noise —
  #    the triage residual-substance test is the filter. --
  - name: "GNews: AI model releases"
    tier: 3
    type: google_news_query
    url: "https://news.google.com/rss/search?q=%22AI%20model%22%20(release%20OR%20launch%20OR%20announces)%20when:1d&hl=en-US&gl=US&ceid=US:en"
    verified: true
  - name: "GNews: open-weight LLM releases"
