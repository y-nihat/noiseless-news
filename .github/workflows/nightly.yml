name: Nightly scan

on:
  schedule:
    # Cron'd 20 min EARLY (21:40 UTC) to absorb GitHub's typical cron delay;
    # the loop supervisor holds until exactly 22:00 UTC (01:00 Istanbul) and
    # always ends by 01:20 UTC (04:20 Istanbul). Turkey is UTC+3, no DST.
    - cron: "40 21 * * *"
  workflow_dispatch:
    inputs:
      smoke:
        description: "Smoke test: 2 short cycles, 1 story each"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  actions: write

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 245   # up-to-20min window hold + 200min night + deploys
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r pipeline/requirements.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Night loop
        timeout-minutes: 235
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          SMOKE: ${{ inputs.smoke == true && 'true' || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
        run: bash .github/scripts/night_loop.sh

      - name: Open failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo '```'
            latest=$(ls -t /tmp/claude-stream-*.jsonl 2>/dev/null | head -1)
            if [ -n "$latest" ]; then tail -c 2500 "$latest"; else echo "no agent output captured"; fi
            echo '```'
          } > /tmp/issue-body.md
          gh issue create \
            --title "Nightly run failed $(date -u +%F)" \
            --body-file /tmp/issue-body.md || true

      # Final backstop deploy — per-cycle deploys are dispatched by the loop.
      - name: Build site
        if: always()
        run: PYTHONPATH=pipeline python -m noiseless.run publish
      - uses: actions/configure-pages@v5
        if: always()
      - uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: site/dist
      - uses: actions/deploy-pages@v4
        if: always()
